services:
  headscale:
    image: docker.io/headscale/headscale:stable
    container_name: headscale
    restart: unless-stopped
    command: serve
    # Testing only. In production, keep Headscale internal and access it through
    # the reverse proxy stack instead of publishing ports directly here.
    # ports:
    #   - "8080:8080"
    environment:
      TZ: ${TZ}
    labels:
      me.tale.headplane.target: "headscale"
    networks:
      - edge
    volumes:
      - ./config/headscale/config.yaml:/etc/headscale/config.yaml:ro
      - ./data/headscale:/var/lib/headscale
    healthcheck:
      test: ["CMD", "headscale", "health"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 5

  headplane:
    image: ghcr.io/tale/headplane:0.6.2
    container_name: headplane
    restart: unless-stopped
    # Testing only. In production, keep Headplane internal and access it
    # through the reverse proxy stack instead of publishing ports directly.
    # ports:
    #   - "3000:3000"
    depends_on:
      headscale:
        condition: service_healthy
    environment:
      TZ: ${TZ}
    networks:
      - edge
    volumes:
      - ./config/headscale/config.yaml:/etc/headscale/config.yaml
      - ./config/headplane/config.yaml:/etc/headplane/config.yaml:ro
      - ./data/headplane:/var/lib/headplane
      - /var/run/docker.sock:/var/run/docker.sock:ro

networks:
  edge:
    external: true
    name: ${EDGE_NETWORK}
