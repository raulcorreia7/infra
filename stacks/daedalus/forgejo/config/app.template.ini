APP_NAME = Forgejo
RUN_MODE = prod

[server]
APP_DATA_PATH = /var/lib/gitea/data
DOMAIN = ${FORGEJO_HOST}
ROOT_URL = https://${FORGEJO_HOST}/
HTTP_ADDR = 0.0.0.0
HTTP_PORT = 3000
DISABLE_SSH = false
SSH_DOMAIN = ${FORGEJO_SSH_HOST}
SSH_PORT = ${FORGEJO_SSH_PORT}
START_SSH_SERVER = true
SSH_LISTEN_HOST = 0.0.0.0
SSH_LISTEN_PORT = 2222
BUILTIN_SSH_SERVER_USER = git
LFS_START_SERVER = true

[database]
DB_TYPE = postgres
HOST = postgres:5432
NAME = ${FORGEJO_DB_NAME}
USER = ${FORGEJO_DB_USER}
PASSWD = ${FORGEJO_DB_PASSWORD}
SSL_MODE = disable
SCHEMA = public

[service]
DISABLE_REGISTRATION = ${FORGEJO_DISABLE_REGISTRATION}

[security]
INSTALL_LOCK = true
SECRET_KEY = ${FORGEJO_SECRET_KEY}
INTERNAL_TOKEN = ${FORGEJO_INTERNAL_TOKEN}
JWT_SECRET = ${FORGEJO_JWT_SECRET}
LFS_JWT_SECRET = ${FORGEJO_LFS_JWT_SECRET}

[log]
MODE = console
